kind = "web"
previewPath = "/"
title = "Dahar Engineering Company"
version = "1.0.0"
id = "artifacts/dahar-engineering"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21638

[services.development]
run = "pnpm --filter @workspace/dahar-engineering run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dahar-engineering", "run", "build" ]
publicDir = "artifacts/dahar-engineering/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21638"
BASE_PATH = "/"
